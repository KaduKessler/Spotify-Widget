services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: spotify-widget:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/db.sqlite

      # Sem valor: o container gera e persiste em ./data na primeira
      # execução (não precisa rodar openssl na mão pra testar).
      SESSION_SECRET: ${SESSION_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      ENABLE_PASSWORD_AUTH: ${ENABLE_PASSWORD_AUTH:-true}
      ENABLE_GITHUB_AUTH: ${ENABLE_GITHUB_AUTH:-false}
      ENABLE_NONE_AUTH: ${ENABLE_NONE_AUTH:-false}

      ADMIN_USERNAME: ${ADMIN_USERNAME:-owner}
      ADMIN_USERS: ${ADMIN_USERS:-}

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

      APP_URL: ${APP_URL:-http://localhost:3000}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:3000/admin}

      ENABLE_HELMET: ${ENABLE_HELMET:-true}
      HELMET_DISABLE_HSTS: ${HELMET_DISABLE_HSTS:-true}

      REGISTRATION_POLICY: ${REGISTRATION_POLICY:-open}
      GITHUB_WHITELIST: ${GITHUB_WHITELIST:-}
      ALLOW_PASSWORD_SIGNUP: ${ALLOW_PASSWORD_SIGNUP:-false}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
